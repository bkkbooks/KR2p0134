body:
  text: 散見簡牘合輯江蘇邗江胡場五號漢墓木牘木楬封檢江君倉天上蒲神君天公高郵君大王滿君盧相氾君中外王父母神魂大翁趙長夫所淮河堬君石里神杜城陽君石里里主宮春姬所君大王宮中池吳王神杜王氾神王大后垂當路君荊主奚丘君水上君王杜宮司空杜邑塞十一月二日道堂邑入十日辛酉道來十六日丁卯高密來十七日戊辰陳忠取敦于狗來廿八日己卯劇馬行卅日辛巳行十二月十三日甲午徐延年行陳忠取狗來十五日丙申行十六日丁酉青隨史行廿日辛丑徐延年來廿三日來廿五日丙午行實道堂邑來戊己未庚申辛酉壬戌癸𠦜七年十二月丙子朔辛卯廣陵宮司空長前丞敢告土主廣陵石里男子王奉世有獄事事已復故郡鄉里遣自致移栺穴𠦜八年獄計書從事如律令集台肉笥餳居女笥栂檽笥金錢笥鮑笋笥脯脩腊笥五種橐粱米橐黃芩橐米橐酒米橐糵鞠橐綵十六寄一垸七匹
